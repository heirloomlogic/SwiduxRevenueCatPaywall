name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the toolchain so runner-image rotations can't flip CI without a repo change.
  DEVELOPER_DIR: /Applications/Xcode_26.5.app

jobs:
  test-macos:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test
        run: swift test

  # `swift test` on macOS never exercises the `#if os(iOS)` branches (fullScreenCover,
  # CustomerCenterView), so run the suite against an iOS Simulator destination too.
  test-ios:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test (iOS Simulator)
        run: |
          xcodebuild test \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -scheme SwiduxRevenueCatPaywall-Package \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath .build/DerivedData
